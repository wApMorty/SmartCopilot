name: Release

# Delivery: `git tag vX.Y.Z && git push --tags` → tests, then a GitHub Release
# carrying the installable npm tarball (no npm registry involved).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm pack
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" ./*.tgz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
